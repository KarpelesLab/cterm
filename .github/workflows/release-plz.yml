name: Release-plz

on:
  push:
    branches: [master]

permissions:
  # Open/update the release PR and push the version-bump commit and tag.
  contents: write
  pull-requests: write

# Don't run two release-plz jobs in parallel.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Cut the release: when a release PR has been merged (the version in
  # Cargo.toml changed), bump nothing further — just create and push the
  # `vX.Y.Z` tag. The pushed tag triggers build.yml, which builds the binaries
  # and creates the GitHub Release.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # release-plz pushes the tag via git. A tag pushed with the default
          # GITHUB_TOKEN cannot trigger other workflows, so build.yml would
          # never fire. Persist a PAT on the checkout so the tag push triggers
          # build.yml's `tags: ['v*']` job.
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  # Maintain the release PR: bumps the version and updates CHANGELOG.md on a
  # branch so each merge to master produces an up-to-date "Release vX.Y.Z" PR.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
