# release-plz manages versioning, the changelog, and git tags for cterm.
# It does NOT publish anything (cterm is an application, not a crates.io
# library) and it does NOT create GitHub Releases or build binaries — the
# existing `.github/workflows/build.yml` already does that when the `v*` tag
# is pushed.

[workspace]
# cterm is an application; nothing in this workspace is published to crates.io.
publish = false

# The whole workspace shares a single version (`version.workspace = true`), so
# we release it as one unit through the root `cterm` crate (see below) and
# don't let release-plz manage every member crate independently. Releasing the
# root crate bumps `[workspace.package].version`, which every member inherits.
release = false

# build.yml creates the GitHub Release (and uploads binaries) when the tag is
# pushed, so release-plz only needs to create the git tag, not the release.
git_release_enable = false

# A single workspace-wide tag, matching build.yml's `tags: ['v*']` trigger.
# Without this, a multi-crate workspace defaults to `{{ package }}-v{{ version }}`.
git_tag_name = "v{{ version }}"

[[package]]
name = "cterm"
# The one crate release-plz actually releases: its version bump drives the
# shared workspace version and produces the single `vX.Y.Z` tag.
release = true
# Fold every other workspace crate's commits into cterm's changelog so the
# single CHANGELOG.md reflects the whole repository, not just root `src/`.
changelog_include = [
    "cterm-core",
    "cterm-ui",
    "cterm-app",
    "cterm-proto",
    "cterm-client",
    "cterm-gtk",
    "cterm-cocoa",
    "cterm-win32",
    "cterm-headless",
]
