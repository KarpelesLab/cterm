# release-plz manages versioning, the changelog, and git tags for cterm.
# It does NOT publish anything (cterm is an application, not a crates.io
# library) and it does NOT create GitHub Releases or build binaries — the
# existing `.github/workflows/build.yml` already does that when the `v*` tag
# is pushed.
#
# The whole workspace shares one version (`version.workspace = true`), so we
# want a single `vX.Y.Z` tag and a single changelog covering every crate. To
# get that, release-plz processes ALL crates (so a change in any crate bumps
# the shared version and propagates up the dependency graph), but only the
# root `cterm` crate emits the tag and owns the changelog.

[workspace]
# cterm is an application; nothing in this workspace is published to crates.io.
publish = false

# build.yml creates the GitHub Release (and uploads binaries) when the tag is
# pushed, so release-plz never creates a GitHub Release itself.
git_release_enable = false

# Every crate's release tracking resolves to the single workspace-wide tag
# (e.g. `v0.0.16`), so release-plz recognizes the existing tag as "already
# released" instead of treating each crate's default `{{package}}-v{{version}}`
# tag (which never existed) as an unreleased initial version.
git_tag_name = "v{{ version }}"

# By default no crate creates a git tag; the root `cterm` crate re-enables it
# below so there's exactly one workspace-wide tag.
git_tag_enable = false

# By default no crate writes a CHANGELOG.md; the root `cterm` crate re-enables
# it below so there's a single aggregated changelog at the repo root.
changelog_update = false

[[package]]
name = "cterm"
# The root crate is the single source of the tag and the changelog. Because
# every crate inherits the shared workspace version, the root crate's manifest
# version always reflects the latest bump, so this tag fires on any release.
git_tag_enable = true
changelog_update = true
# Fold every other workspace crate's commits into cterm's changelog so the
# single CHANGELOG.md reflects the whole repository, not just root `src/`.
changelog_include = [
    "cterm-core",
    "cterm-ui",
    "cterm-app",
    "cterm-proto",
    "cterm-client",
    "cterm-gtk",
    "cterm-cocoa",
    "cterm-win32",
    "cterm-headless",
]
